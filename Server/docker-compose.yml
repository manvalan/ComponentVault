services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-componentvault}
      POSTGRES_USER: ${POSTGRES_USER:-cvault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - cvault_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cvault} -d ${POSTGRES_DB:-componentvault}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env}
      API_KEY: ${API_KEY:?set API_KEY in .env}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    ports:
      - "127.0.0.1:${API_PORT:-8100}:8000"

volumes:
  cvault_pgdata:
